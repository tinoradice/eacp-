<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detector de Gas Inteligente</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #111;
  color: white;
  text-align: center;
}

header {
  background: #c0392b;
  padding: 30px;
}

section {
  margin: 20px;
  padding: 20px;
  background: #222;
  border-radius: 15px;
}

h2 {
  color: #ff6b6b;
}

button {
  padding: 15px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.peligro {
  background: red;
  color: white;
}

.normal {
  background: green;
  color: white;
}

#estado {
  font-size: 20px;
  margin-top: 15px;
}

#conexion {
  color: lightgreen;
}

.parpadeo {
  animation: parpadear 1s infinite;
}

@keyframes parpadear {
  0% {background: #111;}
  50% {background: red;}
  100% {background: #111;}
}
</style>

</head>

<body>

<header>
  <h1>🚨 Detector Inteligente de Gas</h1>
  <p>Sistema con app y salida de emergencia</p>
</header>

<section>
  <h2>Estado del sistema</h2>
  <p id="conexion">🟢 Conectado</p>
  <p id="estado">Estado: Seguro</p>
</section>

<section>
  <h2>Control</h2>
  <button class="peligro" onclick="detectarGas()">Simular fuga 🚨</button>
  <button class="normal" onclick="normal()">Volver a normal ✅</button>
</section>

<section>
  <h2>Información</h2>
  <p>El sistema detecta gas y monóxido, activa alarmas y guía al usuario.</p>
</section>

<footer>
  <p>Valentino Radice - 6°4°</p>
</footer>

<audio id="alarma">
  <source src="https://www.soundjay.com/alarm/alarm-clock-beep-01.mp3">
</audio>

<script>
function detectarGas() {
  document.body.classList.add("parpadeo");
  document.getElementById("estado").innerText = "🚨 PELIGRO: GAS DETECTADO";
  document.getElementById("estado").style.color = "red";
  document.getElementById("conexion").innerText = "🔴 Emergencia";
  
  document.getElementById("alarma").play();

  alert("⚠️ Gas detectado. Evacuar inmediatamente.");
}

function normal() {
  document.body.classList.remove("parpadeo");
  document.body.style.background = "#111";
  
  document.getElementById("estado").innerText = "Estado: Seguro";
  document.getElementById("estado").style.color = "white";
  document.getElementById("conexion").innerText = "🟢 Conectado";

  document.getElementById("alarma").pause();
}
</script>

</body>
</html>
