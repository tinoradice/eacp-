<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detector Inteligente</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

nav {
  background: #020617;
  display: flex;
  justify-content: space-around;
  padding: 15px;
  position: sticky;
  top: 0;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

header {
  text-align: center;
  padding: 30px;
  background: linear-gradient(45deg, red, darkred);
}

.contenedor {
  padding: 20px;
}

.card {
  background: #1e293b;
  margin: 15px 0;
  padding: 20px;
  border-radius: 15px;
}

h2 {
  color: #f87171;
}

button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin: 5px;
  cursor: pointer;
}

.rojo {background: red; color:white;}
.verde {background: green; color:white;}
.naranja {background: orange; color:black;}
.azul {background: #2563eb; color:white;}

#estado {
  font-size: 22px;
  margin-top: 10px;
}

.barra {
  height: 20px;
  background: #333;
  border-radius: 20px;
  overflow: hidden;
  margin-top: 10px;
}

.relleno {
  height: 100%;
  width: 10%;
  background: green;
}

.parpadeo {
  animation: flash 1s infinite;
}

@keyframes flash {
  0% {background:#0f172a;}
  50% {background:red;}
  100% {background:#0f172a;}
}

footer {
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<nav>
  <a href="#">Inicio</a>
  <a href="#">Sistema</a>
  <a href="#">App</a>
</nav>

<header>
  <h1>🚨 Detector Inteligente de Gas</h1>
  <p>Con sistema de emergencia y app</p>
</header>

<div class="contenedor">

<div class="card">
<h2>Estado del sistema</h2>
<p id="estado">Estado: Seguro</p>
<p id="accion">Monitoreando ambiente</p>

<div class="barra">
  <div class="relleno" id="barra"></div>
</div>

<button class="rojo" onclick="gas()">Fuga de gas</button>
<button class="naranja" onclick="mono()">Monóxido</button>
<button class="azul" onclick="fuego()">Incendio</button>
<button class="verde" onclick="normal()">Normal</button>
</div>

<div class="card">
<h2>App simulada 📱</h2>
<p id="app">Todo en orden</p>
</div>

<div class="card">
<h2>Información</h2>
<p>El sistema detecta gases peligrosos y ayuda a evacuar.</p>
</div>

</div>

<footer>
Valentino Radice - 6°4°
</footer>

<audio id="alarma">
<source src="https://www.soundjay.com/alarm/alarm-clock-beep-01.mp3">
</audio>

<script>
function sonar(){document.getElementById("alarma").play();}

function gas(){
document.body.classList.add("parpadeo");
estado.innerText="⚠️ Fuga de gas";
accion.innerText="Ventilar y evacuar";
barra.style.width="80%";
barra.style.background="orange";
app.innerText="Abrí ventanas y salí";
sonar();
}

function mono(){
document.body.classList.add("parpadeo");
estado.innerText="🚨 Monóxido detectado";
accion.innerText="Evacuación inmediata";
barra.style.width="90%";
barra.style.background="red";
app.innerText="Salí YA del lugar";
sonar();
}

function fuego(){
document.body.classList.add("parpadeo");
estado.innerText="🔥 Incendio";
accion.innerText="Evacuar sin ventilar";
barra.style.width="95%";
barra.style.background="yellow";
app.innerText="No abras ventanas";
sonar();
}

function normal(){
document.body.classList.remove("parpadeo");
estado.innerText="Estado: Seguro";
accion.innerText="Monitoreando";
barra.style.width="10%";
barra.style.background="green";
app.innerText="Todo en orden";
document.getElementById("alarma").pause();
}
</script>

</body>
</html>
